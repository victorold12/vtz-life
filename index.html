<style>
:root{
  --bg:#08090d; --bg-2:#0d0f16; --panel:#11131c; --panel-2:#161925;
  --line:#1f2333; --line-2:#2a2f44;
  --txt:#e8eaf2; --txt-2:#9aa0b8; --txt-3:#5c6280;
  --accent:#6d5efc; --accent-2:#8b7dff; --accent-glow:rgba(109,94,252,.35);
  --green:#21d97a; --green-glow:rgba(33,217,122,.18);
  --amber:#ffb340; --red:#ff5a6e; --cyan:#3fd8e0;
  --r:18px; --r-sm:12px;
  --shadow:0 20px 50px -20px rgba(0,0,0,.7);
  --font:'Outfit',sans-serif; --display:'Sora',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--txt);
  overflow:hidden;font-size:15px;-webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(900px 500px at 78% -8%, rgba(109,94,252,.12), transparent 60%),
    radial-gradient(700px 400px at 10% 108%, rgba(33,217,122,.08), transparent 55%);
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}
button,input,select,textarea{font-family:inherit;color:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}
input,select,textarea{outline:none}

/* ---------- APP SHELL ---------- */
#app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:60px 1fr 38px;
  grid-template-areas:"side top" "side main" "side status";height:100vh}

/* TOP BAR */
.topbar{grid-area:top;display:flex;align-items:center;gap:16px;padding:0 26px;
  border-bottom:1px solid var(--line);background:rgba(13,15,22,.6);backdrop-filter:blur(12px)}
.topbar h1{font-family:var(--display);font-size:17px;font-weight:600;letter-spacing:-.02em}
.topbar .page-sub{color:var(--txt-3);font-size:13px;margin-left:2px}
.search{margin-left:auto;display:flex;align-items:center;gap:9px;background:var(--panel);
  border:1px solid var(--line);border-radius:10px;padding:8px 13px;width:280px;transition:.2s}
.search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.search input{background:none;border:none;width:100%;color:var(--txt)}
.search input::placeholder{color:var(--txt-3)}
.topbar .icon-btn{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
  color:var(--txt-2);border:1px solid var(--line);background:var(--panel);transition:.18s}
.topbar .icon-btn:hover{color:var(--txt);border-color:var(--line-2);transform:translateY(-1px)}

/* SIDEBAR */
.sidebar{grid-area:side;background:linear-gradient(180deg,var(--bg-2),var(--bg));
  border-right:1px solid var(--line);display:flex;flex-direction:column;padding:22px 14px}
.brand{display:flex;align-items:center;gap:11px;padding:4px 10px 22px}
.brand .logo{width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg,var(--accent),var(--cyan));display:grid;place-items:center;
  font-family:var(--display);font-weight:800;color:#fff;font-size:18px;box-shadow:0 8px 22px -6px var(--accent-glow)}
.brand .bt{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.02em}
.brand .bt span{color:var(--accent-2)}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nav-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--txt-3);
  padding:14px 12px 7px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;
  color:var(--txt-2);font-weight:500;transition:.16s;position:relative;text-align:left;width:100%}
.nav-item svg{width:19px;height:19px;flex-shrink:0}
.nav-item:hover{background:var(--panel);color:var(--txt)}
.nav-item.active{background:linear-gradient(90deg,rgba(109,94,252,.18),rgba(109,94,252,.04));
  color:#fff}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;background:var(--accent);border-radius:0 4px 4px 0;box-shadow:0 0 10px var(--accent)}
.profile-mini{display:flex;align-items:center;gap:11px;padding:11px;border-radius:12px;
  background:var(--panel);border:1px solid var(--line);margin-top:8px}
.profile-mini .av{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--green));
  display:grid;place-items:center;font-weight:700;color:#fff;font-size:14px}
.profile-mini .nm{font-weight:600;font-size:14px;line-height:1.1}
.profile-mini .rl{font-size:11px;color:var(--txt-3)}

/* MAIN */
.main{grid-area:main;overflow-y:auto;padding:26px 30px 40px}
.view{display:none;animation:fade .35s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* STATUS BAR */
.statusbar{grid-area:status;border-top:1px solid var(--line);background:var(--bg-2);
  display:flex;align-items:center;gap:22px;padding:0 26px;font-size:12.5px;color:var(--txt-2)}
.statusbar .si{display:flex;align-items:center;gap:7px}
.statusbar .si b{color:var(--txt);font-weight:600}
.statusbar .xpbar{width:130px;height:6px;background:var(--line);border-radius:6px;overflow:hidden}
.statusbar .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:6px}
.statusbar .clock{margin-left:auto;font-family:var(--mono);color:var(--txt-3)}

/* ---------- SHARED COMPONENTS ---------- */
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
.section-head h2{font-family:var(--display);font-size:23px;font-weight:700;letter-spacing:-.02em}
.section-head p{color:var(--txt-3);font-size:13.5px;margin-top:3px}
.card{background:linear-gradient(160deg,var(--panel),var(--bg-2));border:1px solid var(--line);
  border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.card.glow::after{content:"";position:absolute;inset:0;border-radius:var(--r);padding:1px;
  background:linear-gradient(140deg,var(--accent-glow),transparent 40%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.6}
.grid{display:grid;gap:16px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;
  font-weight:600;font-size:14px;transition:.16s;border:1px solid transparent}
.btn svg{width:16px;height:16px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;
  box-shadow:0 8px 22px -8px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px -8px var(--accent-glow)}
.btn-ghost{background:var(--panel);border-color:var(--line);color:var(--txt-2)}
.btn-ghost:hover{color:var(--txt);border-color:var(--line-2)}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;letter-spacing:.02em}
.input,select.input,textarea.input{width:100%;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:11px 13px;color:var(--txt);transition:.18s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
label.fl{display:block;font-size:12.5px;color:var(--txt-2);margin-bottom:6px;font-weight:500}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px}
.stat{padding:18px 20px}
.stat .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;margin-bottom:14px}
.stat .lbl{font-size:12.5px;color:var(--txt-3);font-weight:500}
.stat .val{font-family:var(--display);font-size:27px;font-weight:700;margin-top:2px;letter-spacing:-.02em}
.stat .dt{font-size:12px;margin-top:6px;font-weight:600}

/* DASHBOARD LAYOUT */
.dash-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start}
.score-ring{display:flex;align-items:center;gap:24px}
.ring-wrap{position:relative;width:130px;height:130px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-wrap .rt{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring-wrap .rt b{font-family:var(--display);font-size:32px;font-weight:800;display:block;line-height:1}
.ring-wrap .rt s{font-size:11px;color:var(--txt-3);text-decoration:none;letter-spacing:.1em}
.quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px}
.qa{display:flex;align-items:center;gap:10px;padding:13px;border-radius:12px;background:var(--bg);
  border:1px solid var(--line);font-weight:600;font-size:13.5px;transition:.16s;text-align:left}
.qa:hover{border-color:var(--accent);transform:translateY(-2px);color:#fff}
.qa .qi{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.quote{font-family:var(--display);font-size:17px;font-weight:500;line-height:1.5;font-style:italic}
.quote .qa-by{display:block;font-size:13px;color:var(--accent-2);font-style:normal;margin-top:10px;font-weight:600}

/* LISTS / ITEMS */
.item{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:13px;
  background:var(--bg);border:1px solid var(--line);margin-bottom:9px;transition:.15s}
.item:hover{border-color:var(--line-2)}
.check{width:22px;height:22px;border-radius:7px;border:2px solid var(--line-2);flex-shrink:0;
  display:grid;place-items:center;transition:.16s;cursor:pointer}
.check.done{background:var(--green);border-color:var(--green)}
.check.done svg{opacity:1}
.check svg{width:13px;height:13px;opacity:0;color:#04130a}
.item .it-body{flex:1;min-width:0}
.item .it-title{font-weight:600;font-size:14.5px}
.item.done .it-title{text-decoration:line-through;color:var(--txt-3)}
.item .it-meta{font-size:12px;color:var(--txt-3);margin-top:2px;display:flex;gap:10px;align-items:center}
.del{color:var(--txt-3);width:30px;height:30px;border-radius:8px;display:grid;place-items:center;opacity:0;transition:.15s}
.item:hover .del{opacity:1}
.del:hover{color:var(--red);background:rgba(255,90,110,.1)}

/* HABIT GRID */
.habit-grid{display:flex;gap:3px;flex-wrap:wrap;margin-top:10px}
.hc{width:13px;height:13px;border-radius:3px;background:var(--line)}
.hc.l1{background:rgba(33,217,122,.3)}.hc.l2{background:rgba(33,217,122,.55)}
.hc.l3{background:var(--green);box-shadow:0 0 6px var(--green-glow)}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.kcol{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);padding:14px;min-height:180px}
.kcol h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--txt-2);
  margin-bottom:13px;display:flex;align-items:center;gap:8px}
.kcol h4 .cnt{background:var(--panel);padding:1px 8px;border-radius:20px;font-size:11px;color:var(--txt-3)}
.kcard{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 13px;
  margin-bottom:9px;cursor:grab;transition:.15s}
.kcard:hover{border-color:var(--line-2);transform:translateY(-1px)}
.kcard.dragging{opacity:.4}
.kcard .kt{font-weight:600;font-size:14px}
.kcard .kf{display:flex;justify-content:space-between;align-items:center;margin-top:9px}

/* FINANCE */
.fin-list .item .it-title{font-size:14px}
.amt{font-family:var(--display);font-weight:700;font-size:15px}
.amt.in{color:var(--green)}.amt.out{color:var(--red)}
.cat-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.bar-track{height:9px;background:var(--line);border-radius:9px;overflow:hidden;margin-top:8px}
.bar-track i{display:block;height:100%;border-radius:9px;transition:width .5s ease}

/* WORKOUT */
.ex-row{display:grid;grid-template-columns:1fr 70px 70px 80px 30px;gap:10px;align-items:center;
  padding:11px 14px;background:var(--bg);border:1px solid var(--line);border-radius:11px;margin-bottom:8px}
.ex-row .exn{font-weight:600;font-size:14px}
.ex-row .exg{font-size:11.5px;color:var(--txt-3)}
.ex-row .exv{font-family:var(--mono);font-size:13px;text-align:center;color:var(--txt-2)}
.ex-row .exv b{color:var(--txt);font-weight:600}
.ficha-tab{padding:8px 16px;border-radius:10px;font-weight:600;font-size:13.5px;background:var(--panel);
  border:1px solid var(--line);color:var(--txt-2);transition:.15s}
.ficha-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.cal-dow{text-align:center;font-size:11.5px;font-weight:600;color:var(--txt-3);text-transform:uppercase;
  letter-spacing:.05em;padding:6px 0}
.cal-day{aspect-ratio:1;border-radius:11px;background:var(--bg);border:1px solid var(--line);
  padding:8px;position:relative;transition:.15s;cursor:pointer}
.cal-day:hover{border-color:var(--line-2)}
.cal-day.empty{background:transparent;border:none;cursor:default}
.cal-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.cal-day .dn{font-weight:600;font-size:13px}
.cal-day.today .dn{color:var(--accent-2)}
.cal-day .evdot{position:absolute;bottom:8px;left:8px;display:flex;gap:3px}
.cal-day .evdot i{width:5px;height:5px;border-radius:50%}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(4,5,9,.7);backdrop-filter:blur(6px);z-index:90;
  display:none;align-items:center;justify-content:center;animation:fade .2s}
.modal-bg.show{display:flex}
.modal{background:var(--panel-2);border:1px solid var(--line-2);border-radius:20px;width:440px;
  max-width:92vw;padding:26px;box-shadow:var(--shadow);animation:pop .25s cubic-bezier(.2,.9,.3,1.2)}
@keyframes pop{from{transform:scale(.94) translateY(10px);opacity:0}to{transform:none;opacity:1}}
.modal h3{font-family:var(--display);font-size:19px;font-weight:700;margin-bottom:5px}
.modal .ms{color:var(--txt-3);font-size:13px;margin-bottom:20px}
.modal .frow{margin-bottom:14px}
.modal .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}

/* TOAST */
#toast{position:fixed;bottom:54px;right:26px;z-index:99;display:flex;flex-direction:column;gap:10px}
.tst{background:var(--panel-2);border:1px solid var(--line-2);border-left:3px solid var(--green);
  border-radius:12px;padding:13px 18px;font-weight:500;font-size:14px;box-shadow:var(--shadow);
  animation:slideIn .3s;display:flex;align-items:center;gap:10px;min-width:220px}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}

.empty{text-align:center;padding:36px 20px;color:var(--txt-3)}
.empty svg{width:38px;height:38px;opacity:.4;margin-bottom:10px}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start}
@media(max-width:1100px){.dash-grid,.two-col{grid-template-columns:1fr}.stat-row{grid-template-columns:repeat(2,1fr)}}

/* ---------- TEMA CLARO ---------- */
body.light{
  --bg:#f4f5fa; --bg-2:#fff; --panel:#fff; --panel-2:#fff;
  --line:#e4e6ef; --line-2:#d2d5e3;
  --txt:#15172b; --txt-2:#4a4f66; --txt-3:#8a8fa8;
  --shadow:0 20px 50px -20px rgba(40,40,80,.22);
  background-image:
    radial-gradient(900px 500px at 78% -8%, rgba(109,94,252,.10), transparent 60%),
    radial-gradient(700px 400px at 10% 108%, rgba(33,217,122,.08), transparent 55%);
}
body.light .topbar{background:rgba(255,255,255,.7)}
body.light .sidebar{background:linear-gradient(180deg,#fff,#f4f5fa)}

/* ---------- iOS SAFE AREA ---------- */
.topbar{padding-top:env(safe-area-inset-top)}
@supports(-webkit-touch-callout:none){
  .topbar{height:calc(60px + env(safe-area-inset-top))}
}

/* clicável: itens editáveis */
.item.editable,.kcard,.ex-row.editable,.fin-list .item{cursor:pointer}
.it-body{cursor:pointer}
.edit-hint{opacity:0;transition:.15s;color:var(--txt-3);font-size:11px;margin-left:auto}
.item:hover .edit-hint{opacity:1}

/* ---------- MOBILE (iPhone) ---------- */
.mobile-nav{display:none}
@media(max-width:760px){
  #app{grid-template-columns:1fr;
    grid-template-rows:calc(56px + env(safe-area-inset-top)) 1fr auto;
    grid-template-areas:"top" "main" "mnav"}
  .sidebar{display:none}
  .statusbar{display:none}
  .topbar{padding:env(safe-area-inset-top) 16px 0;gap:10px}
  .topbar h1{font-size:18px}
  .search{display:none}
  .main{padding:18px 15px calc(20px + env(safe-area-inset-bottom))}
  .stat-row{grid-template-columns:repeat(2,1fr);gap:11px}
  .stat{padding:14px 15px}
  .stat .val{font-size:22px}
  .section-head h2{font-size:20px}
  .kanban{grid-template-columns:1fr;gap:11px}
  .kcol{min-height:auto}
  .dash-grid,.two-col{grid-template-columns:1fr}
  .modal{width:100%;max-width:100%;border-radius:22px 22px 0 0;position:fixed;bottom:0;left:0;
    padding:24px 20px calc(24px + env(safe-area-inset-bottom));animation:slideUp .3s cubic-bezier(.2,.9,.3,1.1)}
  .modal-bg{align-items:flex-end}
  .ex-row{grid-template-columns:1fr 54px 54px 64px 28px;gap:6px;padding:11px}
  .ex-row .exv{font-size:12px}
  #toast{bottom:calc(76px + env(safe-area-inset-bottom));right:12px;left:12px}
  .tst{min-width:0}
  /* menu inferior fixo */
  .mobile-nav{display:flex;grid-area:mnav;background:rgba(13,15,22,.92);backdrop-filter:blur(16px);
    border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    justify-content:space-around}
  body.light .mobile-nav{background:rgba(255,255,255,.92)}
  .mnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:12px;
    color:var(--txt-3);font-size:10px;font-weight:600;flex:1;transition:.15s}
  .mnav-item svg{width:21px;height:21px}
  .mnav-item.active{color:var(--accent-2)}
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}

/* ---------- JARVIS CHAT ---------- */
.jarvis-fab{position:fixed;bottom:70px;right:22px;z-index:80;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--cyan));color:#fff;font-size:22px;
  box-shadow:0 8px 28px -6px var(--accent-glow);transition:.2s;display:grid;place-items:center}
.jarvis-fab:hover{transform:scale(1.1)}
@media(max-width:760px){.jarvis-fab{bottom:calc(76px + env(safe-area-inset-bottom))}}
.jarvis-overlay{position:fixed;bottom:136px;right:22px;z-index:80;width:340px;max-width:92vw;
  background:var(--panel-2);border:1px solid var(--line-2);border-radius:20px;
  box-shadow:var(--shadow);display:none;flex-direction:column;overflow:hidden}
.jarvis-overlay.open{display:flex}
@media(max-width:760px){.jarvis-overlay{bottom:calc(148px + env(safe-area-inset-bottom));right:10px;left:10px;width:auto}}
.jarvis-hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);
  background:linear-gradient(135deg,rgba(109,94,252,.18),rgba(63,216,224,.08))}
.jarvis-hdr b{font-family:var(--display);font-size:15px}
.jarvis-hdr .jclose{margin-left:auto;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;
  color:var(--txt-3);transition:.15s}
.jarvis-hdr .jclose:hover{background:var(--line);color:var(--txt)}
.jarvis-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;max-height:320px;min-height:80px}
.jmsg{padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.6;max-width:94%}
.jmsg.bot{background:var(--panel);border:1px solid var(--line);align-self:flex-start}
.jmsg.usr{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;align-self:flex-end}
.jmsg.loading{color:var(--txt-3);font-style:italic}
.jmsg .jp{margin:0 0 8px}
.jmsg .jp:last-child{margin-bottom:0}
.jmsg .jh{font-family:var(--display);font-weight:700;font-size:14px;color:var(--txt);margin:10px 0 4px}
.jmsg .jli{display:flex;gap:7px;margin:3px 0;align-items:flex-start}
.jmsg .jli>span:first-child{color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px}
.jmsg b{color:var(--txt);font-weight:700}
.jarvis-inp{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
.jarvis-inp input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;font-size:13.5px;transition:.15s}
.jarvis-inp input:focus{border-color:var(--accent)}
.jarvis-inp button{background:var(--accent);color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;transition:.15s}
.jarvis-inp button:hover{background:var(--accent-2)}

/* ---------- MISSÕES ---------- */
.mission-item{display:flex;align-items:center;gap:13px;padding:14px 16px;border-radius:14px;
  background:var(--bg);border:1px solid var(--line);margin-bottom:9px;transition:.15s}
.mission-item.done{opacity:.55}
.mission-item .mic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:20px;flex-shrink:0}
.mission-item .mbody{flex:1}
.mission-item .mt{font-weight:600;font-size:14.5px}
.mission-item .mm{font-size:12px;color:var(--txt-3);margin-top:2px}
.mission-item .mxp{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--amber)}
.mbar-wrap{margin-top:16px}
.mbar-wrap .mbar-lbl{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px}
.mbar-wrap .mbar{height:10px;background:var(--line);border-radius:10px;overflow:hidden}
.mbar-wrap .mbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:10px;transition:width .5s}

/* ---------- FOCO / POMODORO ---------- */
.pomo-ring{display:flex;flex-direction:column;align-items:center;gap:20px;padding:30px 0}
.pomo-time{font-family:var(--display);font-size:64px;font-weight:800;letter-spacing:-.03em;line-height:1}
.pomo-label{font-size:14px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.12em}
.pomo-btns{display:flex;gap:12px}

/* ---------- SHAPE ---------- */
.shape-zones{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.zone-card{padding:14px;border-radius:13px;background:var(--bg);border:1px solid var(--line);text-align:center}
.zone-card .zic{font-size:28px;display:block;margin-bottom:6px}
.zone-card .zn{font-size:12px;font-weight:600;color:var(--txt-2)}
.zone-card .zv{font-family:var(--display);font-size:22px;font-weight:700;margin-top:2px}

/* ---------- DIETA ---------- */
.macro-bar{margin-bottom:12px}
.macro-bar .mb-lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.macro-bar .mb-track{height:8px;background:var(--line);border-radius:8px;overflow:hidden}
.macro-bar .mb-track i{display:block;height:100%;border-radius:8px;transition:width .4s}

/* ---------- BIBLIOTECA ---------- */
.book-card{padding:16px;cursor:pointer;transition:.15s}
.book-card:hover{border-color:var(--accent)}
.book-card .bk-title{font-family:var(--display);font-size:15px;font-weight:700}
.book-card .bk-author{font-size:12.5px;color:var(--txt-3);margin-top:3px}
.book-card .bk-prog{height:4px;background:var(--line);border-radius:4px;margin-top:12px;overflow:hidden}
.book-card .bk-prog i{display:block;height:100%;background:var(--accent);border-radius:4px}

/* ---------- HIDRATAÇÃO ---------- */
.cups-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-top:14px}
.cup{font-size:26px;cursor:pointer;text-align:center;transition:.2s;filter:grayscale(1);opacity:.4}
.cup.filled{filter:none;opacity:1;transform:scale(1.1)}

/* ---------- PREDIÇÃO ---------- */
.pred-box{padding:18px;border-radius:14px;background:var(--bg);border:1px solid var(--line);text-align:center;margin-bottom:10px}
.pred-box .pb-val{font-family:var(--display);font-size:36px;font-weight:800;color:var(--green)}
.pred-box .pb-lbl{font-size:12.5px;color:var(--txt-3);margin-top:4px}
</style>
</head>

<script>
/* =================================================================
   VTz Life — núcleo de estado + persistência local (localStorage)
   ================================================================= */
const KEY='vtz_life_v1';
const todayISO=()=>new Date().toISOString().slice(0,10);

const seed=()=>({
  xp:340, theme:'dark', lastActive:todayISO(),
  profile:{name:'Victor Hugo',avatar:'VH',tag:'Constância > Perfeição',accent:'#6d5efc'},
  tasks:[
    {id:1,title:'Revisar roadmap do VTZ 1.0',prio:'alta',status:'doing',due:todayISO(),done:false},
    {id:2,title:'Ler 10min — Provérbios',prio:'media',status:'todo',due:todayISO(),done:false},
    {id:3,title:'Rodar bench.py e atualizar BASELINE.md',prio:'alta',status:'todo',due:todayISO(),done:false},
    {id:4,title:'Beber 2L de água',prio:'baixa',status:'done',due:todayISO(),done:true},
  ],
  habits:[
    {id:1,name:'Treinar',icon:'💪',log:genLog(.8)},
    {id:2,name:'Ler Bíblia',icon:'📖',log:genLog(.7)},
    {id:3,name:'Beber 2L água',icon:'💧',log:genLog(.6)},
    {id:4,name:'Skincare',icon:'🧴',log:genLog(.75)},
    {id:5,name:'Mewing / postura',icon:'🧘',log:genLog(.65)},
  ],
  finance:[
    {id:1,desc:'Salário jovem aprendiz',val:700,type:'in',cat:'Renda',date:todayISO()},
    {id:2,desc:'Whey + creatina',val:189.9,type:'out',cat:'Saúde',date:todayISO()},
    {id:3,desc:'Almoço',val:22,type:'out',cat:'Alimentação',date:todayISO()},
    {id:4,desc:'Reserva (5º dia útil)',val:200,type:'out',cat:'Poupança',date:todayISO()},
  ],
  budget:500,
  fichas:[
    {id:1,name:'A — Peito & Tríceps',ex:[
      {n:'Supino inclinado halter',g:'Peito sup.',s:4,r:'8-12',c:24},
      {n:'Supino reto barra',g:'Peito',s:4,r:'6-10',c:50},
      {n:'Crucifixo inclinado',g:'Peito sup.',s:3,r:'12-15',c:14},
      {n:'Tríceps testa',g:'Tríceps',s:4,r:'10-12',c:25},
      {n:'Tríceps corda',g:'Tríceps',s:3,r:'12-15',c:20},
    ]},
    {id:2,name:'B — Costas & Bíceps',ex:[
      {n:'Puxada frontal',g:'Dorsal',s:4,r:'8-12',c:55},
      {n:'Remada curvada',g:'Dorsal',s:4,r:'8-10',c:40},
      {n:'Remada unilateral',g:'Dorsal',s:3,r:'10-12',c:26},
      {n:'Rosca direta',g:'Bíceps',s:4,r:'10-12',c:14},
      {n:'Rosca martelo',g:'Bíceps',s:3,r:'12',c:12},
    ]},
    {id:3,name:'C — Pernas & Ombro',ex:[
      {n:'Agachamento livre',g:'Quadríceps',s:4,r:'8-10',c:60},
      {n:'Leg press',g:'Quadríceps',s:4,r:'10-12',c:160},
      {n:'Cadeira flexora',g:'Posterior',s:3,r:'12',c:35},
      {n:'Elevação lateral',g:'Ombro',s:4,r:'12-15',c:10},
      {n:'Desenvolvimento',g:'Ombro',s:4,r:'8-10',c:22},
    ]},
  ],
  events:[
    {id:1,title:'Treino — Ficha A',date:todayISO(),time:'18:10',cat:'treino'},
    {id:2,title:'Escola (13h–18h)',date:todayISO(),time:'13:00',cat:'estudo'},
  ],
});
function genLog(p){const o={};for(let i=0;i<35;i++){const d=new Date();d.setDate(d.getDate()-i);
  o[d.toISOString().slice(0,10)]=Math.random()<p}return o}

let S=load();
function load(){try{const r=localStorage.getItem(KEY);const s=r?JSON.parse(r):seed();
  // migração: garante campos novos em dados salvos antigos
  if(!s.profile)s.profile={name:'Victor Hugo',avatar:'VH',tag:'Constância > Perfeição',accent:'#6d5efc'};
  if(s.theme===undefined)s.theme='dark';
  return s;}catch(e){return seed()}}

/* =================================================================
   SYNC FIREBASE — login Google + Firestore (multi-dispositivo)
   ================================================================= */
let SYNC={user:null,unsub:null,suppressNext:false,saveTimer:null,initialized:false,app:null,auth:null,db:null};

function save(){
  localStorage.setItem(KEY,JSON.stringify(S));
  scheduleCloudSave();
}
function scheduleCloudSave(){
  if(!SYNC.user||!SYNC.db)return;
  clearTimeout(SYNC.saveTimer);
  SYNC.saveTimer=setTimeout(async()=>{
    try{
      const {doc,setDoc}=window.FB;
      SYNC.suppressNext=true;
      await setDoc(doc(SYNC.db,'users',SYNC.user.uid),{state:S,updatedAt:Date.now()});
      renderSyncStatus('synced');
    }catch(e){console.error('Cloud save failed:',e);renderSyncStatus('error')}
  },2000);
}

function initFirebase(){
  if(SYNC.initialized||!window.FB)return;
  SYNC.initialized=true;
  const {initializeApp,getAuth,getFirestore,onAuthStateChanged,firebaseConfig}=window.FB;
  SYNC.app=initializeApp(firebaseConfig);
  SYNC.auth=getAuth(SYNC.app);
  SYNC.db=getFirestore(SYNC.app);
  onAuthStateChanged(SYNC.auth,u=>{
    SYNC.user=u;
    renderSyncStatus(u?'connecting':'offline');
    if(u){attachCloudListener()}
    else{if(SYNC.unsub){SYNC.unsub();SYNC.unsub=null}}
    if(window.currentView==='config')render();
  });
}

async function attachCloudListener(){
  const {doc,getDoc,setDoc,onSnapshot}=window.FB;
  const ref=doc(SYNC.db,'users',SYNC.user.uid);
  const snap=await getDoc(ref);
  if(snap.exists()){
    S=snap.data().state;
    localStorage.setItem(KEY,JSON.stringify(S));
    if(window.currentView)go(window.currentView);
    toast('Dados sincronizados da nuvem','☁️');
  }else{
    await setDoc(ref,{state:S,updatedAt:Date.now()});
  }
  SYNC.unsub=onSnapshot(ref,snap=>{
    if(SYNC.suppressNext){SYNC.suppressNext=false;return}
    if(!snap.exists())return;
    S=snap.data().state;
    localStorage.setItem(KEY,JSON.stringify(S));
    if(window.currentView)go(window.currentView);
    renderSyncStatus('synced');
  });
}

async function loginGoogle(){
  if(!SYNC.auth){toast('Firebase não inicializado','⚠️');return;}
  try{
    const {GoogleAuthProvider,signInWithPopup}=window.FB;
    await signInWithPopup(SYNC.auth,new GoogleAuthProvider());

function hexA(hex,a){const n=parseInt(hex.slice(1),16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function shade(hex,amt){const n=parseInt(hex.slice(1),16);
  const r=Math.min(255,(n>>16&255)+amt),g=Math.min(255,(n>>8&255)+amt),b=Math.min(255,(n&255)+amt);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1)}

/* ---------- LEVEL / STREAK ---------- */
const lvlOf=xp=>Math.floor(Math.sqrt(xp/40))+1;
const xpForLvl=l=>40*Math.pow(l-1,2);
function streakCount(){
  const h=S.habits[0];if(!h)return 0;let c=0;const d=new Date();
  for(let i=0;i<60;i++){const k=d.toISOString().slice(0,10);
    const any=S.habits.some(x=>x.log[k]);if(any)c++;else if(i>0)break;d.setDate(d.getDate()-1)}
  return c;
}
function todayPct(){
  const t=S.tasks.filter(x=>x.due===todayISO());
  if(!t.length)return 0;return Math.round(t.filter(x=>x.done).length/t.length*100);
}

function initDnD(){
  let dragged=null;
  $$('.kcard').forEach(c=>{
    c.addEventListener('dragstart',()=>{dragged=c;c.classList.add('dragging')});
    c.addEventListener('dragend',()=>{c.classList.remove('dragging');dragged=null});
  });
  $$('.kbody').forEach(body=>{
    body.addEventListener('dragover',e=>{e.preventDefault();body.parentElement.style.borderColor='var(--accent)'});
    body.addEventListener('dragleave',()=>body.parentElement.style.borderColor='');
    body.addEventListener('drop',e=>{e.preventDefault();body.parentElement.style.borderColor='';
      if(!dragged)return;const id=+dragged.dataset.id;const st=body.dataset.status;
      const t=S.tasks.find(x=>x.id===id);t.status=st;t.done=(st==='done');
      if(st==='done')addXp(15);save();render();});
  });
}

let calMonth=new Date().getMonth(), calYear=new Date().getFullYear();
const evCatColor={treino:'var(--accent)',estudo:'var(--cyan)',saude:'var(--green)',
  pessoal:'var(--amber)',trabalho:'var(--red)'};
function viewAgenda(m){
  const mn=new Date(calYear,calMonth).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  m.innerHTML=`
  <div class="section-head">
    <div><h2>Agenda</h2><p>Gestão de tempo e compromissos</p></div>
    <button class="btn btn-primary" onclick="openEvent()">＋ Novo evento</button>
  </div>
  <div class="two-col">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <b style="font-family:var(--display);font-size:17px;text-transform:capitalize">${mn}</b>
        <div style="display:flex;gap:8px">
          <button class="icon-btn" style="width:34px;height:34px" onclick="calNav(-1)">‹</button>
          <button class="icon-btn" style="width:34px;height:34px" onclick="calNav(1)">›</button>
        </div>
      </div>
      <div class="cal-grid">
        ${['D','S','T','Q','Q','S','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${calCells()}
      </div>
    </div>
    <div class="card">
      <b style="font-family:var(--display);font-size:15px;display:block;margin-bottom:14px">Próximos eventos</b>
      <div id="evList">${upcomingEvents()}</div>
    </div>
  </div>`;
}
function calCells(){
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  let html='';for(let i=0;i<first;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=days;d++){
    const iso=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=S.events.filter(e=>e.date===iso);
    const isToday=iso===todayISO();
    html+=`<div class="cal-day ${isToday?'today':''}" onclick="openEvent('${iso}')">
      <div class="dn">${d}</div>
      ${evs.length?`<div class="evdot">${evs.slice(0,3).map(e=>`<i style="background:${evCatColor[e.cat]||'var(--accent)'}"></i>`).join('')}</div>`:''}
    </div>`;
  }
  return html;
}
function calNav(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++}if(calMonth<0){calMonth=11;calYear--}render()}
function upcomingEvents(){
  const ev=[...S.events].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))
    .filter(e=>e.date>=todayISO());
  if(!ev.length)return emptyState('Nenhum evento agendado');
  return ev.slice(0,8).map(e=>`<div class="item editable">
    <span style="width:4px;align-self:stretch;border-radius:4px;background:${evCatColor[e.cat]||'var(--accent)'}"></span>
    <div class="it-body" onclick="openEvent(null,${e.id})"><div class="it-title">${esc(e.title)}</div>
      <div class="it-meta">${new Date(e.date+'T00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})} · ${e.time}
        <span class="tag" style="background:${(evCatColor[e.cat]||'var(--accent)')}22;color:${evCatColor[e.cat]||'var(--accent)'}">${e.cat}</span></div></div>
    <span class="edit-hint">editar</span>
    <button class="del" onclick="event.stopPropagation();delEvent(${e.id})">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>`).join('');
}
function openEvent(date,id){
  const e=id?S.events.find(x=>x.id===id):null;
  const cats=[['treino','Treino'],['estudo','Estudo'],['saude','Saúde'],['pessoal','Pessoal'],['trabalho','Trabalho']];
  modal(`<h3>${e?'Editar evento':'Novo evento'}</h3><p class="ms">Compromisso ou bloco de tempo</p>
    <div class="frow"><label class="fl">Título</label><input class="input" id="eTitle" placeholder="Ex: Treino Ficha A" value="${e?esc(e.title):''}"></div>
    <div class="fgrid">
      <div class="frow"><label class="fl">Data</label><input type="date" class="input" id="eDate" value="${e?e.date:(date||todayISO())}"></div>
      <div class="frow"><label class="fl">Hora</label><input type="time" class="input" id="eTime" value="${e?e.time:'18:10'}"></div>
    </div>
    <div class="frow"><label class="fl">Categoria</label>
      <select class="input" id="eCat">${cats.map(([v,l])=>`<option value="${v}" ${e&&e.cat===v?'selected':''}>${l}</option>`).join('')}</select></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEvent(${id||0})">${e?'Salvar':'Agendar'}</button></div>`);
  setTimeout(()=>$('#eTitle')?.focus(),50);
}
function saveEvent(id){const title=$('#eTitle').value.trim();if(!title)return;
  const data={title,date:$('#eDate').value,time:$('#eTime').value,cat:$('#eCat').value};
  if(id){Object.assign(S.events.find(x=>x.id===id),data);toast('Evento atualizado','✏️')}
  else{S.events.push({id:uid(),...data});addXp(5);toast('Evento agendado','📅')}
  save();closeModal();render()}
function delEvent(id){S.events=S.events.filter(e=>e.id!==id);save();render();toast('Evento removido','🗑️')}

/* =================================================================
   TREINO
   ================================================================= */
let activeFicha=1;
function viewTreino(m){
  const f=S.fichas.find(x=>x.id===activeFicha)||S.fichas[0];
  const vol=f.ex.reduce((a,e)=>a+e.s,0);
  m.innerHTML=`
  <div class="section-head">
    <div><h2>Treino</h2><p>Densidade muscular · janela 18h10–19h35</p></div>
    <button class="btn btn-primary" onclick="openEx()">＋ Exercício</button>
  </div>
  <div class="stat-row" style="grid-template-columns:repeat(3,1fr)">
    ${statCard('Ficha ativa',f.name.split(' — ')[0],f.name.split(' — ')[1]||'','var(--accent-2)','var(--accent)','rgba(109,94,252,.13)','<path d="M4 9v6M20 9v6M7 6v12M17 6v12M7 12h10"/>')}
    ${statCard('Exercícios',f.ex.length,'no treino','var(--cyan)','var(--cyan)','rgba(63,216,224,.13)','<path d="M9 11l3 3L22 4"/>')}
    ${statCard('Volume',vol,'séries totais','var(--green)','var(--green)','rgba(33,217,122,.13)','<path d="M3 12l4-4 4 4 4-8 6 12"/>')}
  </div>
  <div style="display:flex;gap:9px;margin:6px 0 18px;flex-wrap:wrap;align-items:center">
    ${S.fichas.map(fc=>`<button class="ficha-tab ${fc.id===activeFicha?'active':''}" onclick="setFicha(${fc.id})">${esc(fc.name.split(' — ')[0])}</button>`).join('')}
    <button class="ficha-tab" onclick="openFicha()" style="color:var(--accent-2)">＋ Ficha</button>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap">
      <b style="font-family:var(--display);font-size:16px;cursor:pointer" onclick="openFicha(${f.id})" title="Clique para renomear">${esc(f.name)} <span style="font-size:12px;color:var(--txt-3)">✏️</span></b>
      <div style="display:flex;gap:8px">
        ${S.fichas.length>1?`<button class="btn btn-ghost" style="padding:8px 12px" onclick="delFicha(${f.id})">Excluir ficha</button>`:''}
        <button class="btn btn-primary" style="padding:8px 14px" onclick="finishWorkout()">✓ Concluir treino</button>
      </div>
    </div>
    <div class="ex-row" style="background:transparent;border:none;color:var(--txt-3);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;padding-bottom:0">
      <span>Exercício</span><span style="text-align:center">Séries</span><span style="text-align:center">Reps</span><span style="text-align:center">Carga</span><span></span>
    </div>
    ${f.ex.map((e,i)=>exRow(e,i)).join('')}
  </div>`;
}
function exRow(e,i){
  return `<div class="ex-row editable" onclick="if(!event.target.closest('.del'))openEx(${i})">
    <div><div class="exn">${esc(e.n)}</div><div class="exg">${esc(e.g)}</div></div>
    <div class="exv"><b>${e.s}</b></div>
    <div class="exv"><b>${e.r}</b></div>
    <div class="exv"><b>${e.c}</b> kg</div>
    <button class="del" style="opacity:1" onclick="event.stopPropagation();delEx(${i})">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>`;
}
function setFicha(id){activeFicha=id;render()}
function delEx(i){const f=S.fichas.find(x=>x.id===activeFicha);f.ex.splice(i,1);save();render()}
function finishWorkout(){addXp(40);
  const k=todayISO();const h=S.habits.find(x=>x.name==='Treinar');if(h){h.log[k]=true}
  save();render();toast('Treino concluído! +40 XP','💪')}
function openEx(idx){
  const isEdit=(typeof idx==='number');
  const f=S.fichas.find(x=>x.id===activeFicha);
  const e=isEdit?f.ex[idx]:null;
  modal(`<h3>${e?'Editar exercício':'Novo exercício'}</h3><p class="ms">Ficha: ${esc(f.name)}</p>
    <div class="frow"><label class="fl">Nome</label><input class="input" id="xN" placeholder="Ex: Supino inclinado" value="${e?esc(e.n):''}"></div>
    <div class="frow"><label class="fl">Grupo muscular</label><input class="input" id="xG" placeholder="Ex: Peito superior" value="${e?esc(e.g):''}"></div>
    <div class="fgrid">
      <div class="frow"><label class="fl">Séries</label><input type="number" class="input" id="xS" value="${e?e.s:4}"></div>
      <div class="frow"><label class="fl">Reps</label><input class="input" id="xR" value="${e?esc(e.r):'8-12'}"></div>
    </div>
    <div class="frow"><label class="fl">Carga (kg)</label><input type="number" step="0.5" class="input" id="xC" value="${e?e.c:20}"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEx(${isEdit?idx:-1})">${e?'Salvar':'Adicionar'}</button></div>`);
  setTimeout(()=>$('#xN')?.focus(),50);
}
function saveEx(idx){const n=$('#xN').value.trim();if(!n)return;
  const f=S.fichas.find(x=>x.id===activeFicha);
  const data={n,g:$('#xG').value||'Geral',s:+$('#xS').value,r:$('#xR').value,c:+$('#xC').value};
  if(idx>=0){f.ex[idx]=data;toast('Exercício atualizado','✏️')}
  else{f.ex.push(data);toast('Exercício adicionado','💪')}
  save();closeModal();render()}

function openFicha(id){
  const f=id?S.fichas.find(x=>x.id===id):null;
  modal(`<h3>${f?'Renomear ficha':'Nova ficha de treino'}</h3><p class="ms">Use o formato "Letra — Foco" (ex: D — Full Body)</p>
    <div class="frow"><label class="fl">Nome da ficha</label><input class="input" id="fkN" placeholder="Ex: D — Full Body" value="${f?esc(f.name):''}"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveFicha(${id||0})">${f?'Salvar':'Criar'}</button></div>`);
  setTimeout(()=>$('#fkN')?.focus(),50);
}
function saveFicha(id){const name=$('#fkN').value.trim();if(!name)return;
  if(id){S.fichas.find(x=>x.id===id).name=name;toast('Ficha renomeada','✏️')}
  else{const nf={id:uid(),name,ex:[]};S.fichas.push(nf);activeFicha=nf.id;toast('Ficha criada','📋')}
  save();closeModal();render()}
function delFicha(id){if(S.fichas.length<=1)return;
  modal(`<h3>Excluir ficha?</h3><p class="ms">Todos os exercícios desta ficha serão removidos.</p>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="background:var(--red);box-shadow:none" onclick="confirmDelFicha(${id})">Excluir</button></div>`);
}
function confirmDelFicha(id){S.fichas=S.fichas.filter(x=>x.id!==id);
  activeFicha=S.fichas[0].id;save();closeModal();render();toast('Ficha excluída','🗑️')}

/* =================================================================
   FINANCEIRO
   ================================================================= */
function viewFinance(m){
  const inc=S.finance.filter(f=>f.type==='in').reduce((a,b)=>a+b.val,0);
  const out=S.finance.filter(f=>f.type==='out').reduce((a,b)=>a+b.val,0);
  const bal=inc-out;
  const byCat={};S.finance.filter(f=>f.type==='out').forEach(f=>byCat[f.cat]=(byCat[f.cat]||0)+f.val);
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxCat=cats.length?cats[0][1]:1;
  const budgetUsed=Math.min(100,Math.round(out/S.budget*100));

  m.innerHTML=`
  <div class="section-head">
    <div><h2>Financeiro</h2><p>Controle de receitas, gastos e reserva</p></div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <button class="btn btn-ghost" onclick="openFin('in')">＋ Receita</button>
      <button class="btn btn-primary" onclick="openFin('out')">＋ Gasto</button>
      <button class="btn btn-ghost" onclick="jarvisFinanceAnalysis()">🤖 Jarvis analisa</button>
    </div>
  </div>
  <div class="stat-row" style="grid-template-columns:repeat(3,1fr)">
    ${statCard('Receitas',brl(inc),'entradas','var(--green)','var(--green)','rgba(33,217,122,.13)','<path d="M12 19V5M5 12l7-7 7 7"/>')}
    ${statCard('Despesas',brl(out),'saídas','var(--red)','var(--red)','rgba(255,90,110,.13)','<path d="M12 5v14M5 12l7 7 7-7"/>')}
    ${statCard('Saldo',brl(bal),bal>=0?'positivo':'negativo',bal>=0?'var(--green)':'var(--red)','var(--accent)','rgba(109,94,252,.13)','<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/>')}
  </div>
  <div class="two-col">
    <div class="card">
      <b style="font-family:var(--display);font-size:15px;display:block;margin-bottom:14px">Transações recentes</b>
      <div class="fin-list">${S.finance.slice().reverse().map(finItem).join('')||emptyState('Sem transações')}</div>
    </div>
    <div class="grid" style="gap:16px">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <b style="font-family:var(--display);font-size:15px">Orçamento mensal</b>
          <span style="font-size:13px;color:var(--txt-3)">${brl(out)} / ${brl(S.budget)}</span>
        </div>
        <div class="bar-track"><i style="width:${budgetUsed}%;background:${budgetUsed>85?'var(--red)':budgetUsed>60?'var(--amber)':'var(--green)'}"></i></div>
        <div style="font-size:12.5px;color:${budgetUsed>85?'var(--red)':'var(--txt-3)'};margin-top:8px;font-weight:600">
          ${budgetUsed>=100?'⚠️ Orçamento estourado':budgetUsed>85?'⚠️ Atenção: '+budgetUsed+'% usado':budgetUsed+'% do orçamento usado'}</div>
      </div>
      <div class="card">
        <b style="font-family:var(--display);font-size:15px;display:block;margin-bottom:14px">Gastos por categoria</b>
        ${cats.length?cats.map(([c,v])=>`
          <div style="margin-bottom:13px">
            <div style="display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:2px">
              <span><span class="cat-dot" style="background:${catColor[c]||'var(--txt-3)'}"></span> ${esc(c)}</span>
              <b>${brl(v)}</b></div>
            <div class="bar-track"><i style="width:${Math.round(v/maxCat*100)}%;background:${catColor[c]||'var(--txt-3)'}"></i></div>
          </div>`).join(''):emptyState('Sem gastos ainda')}
      </div>
    </div>
  </div>`;
}
function finItem(f){
  const c=catColor[f.cat]||'var(--txt-3)';
  return `<div class="item editable">
    <span style="width:36px;height:36px;border-radius:10px;background:${c}22;display:grid;place-items:center;color:${c};font-weight:700">
      ${f.type==='in'?'↑':'↓'}</span>
    <div class="it-body" onclick="openFin('${f.type}',${f.id})"><div class="it-title">${esc(f.desc)}</div>
      <div class="it-meta"><span class="tag" style="background:${c}22;color:${c}">${esc(f.cat)}</span>
        ${new Date(f.date+'T00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})}</div></div>
    <span class="amt ${f.type}">${f.type==='in'?'+':'−'}${brl(f.val)}</span>
    <button class="del" onclick="event.stopPropagation();delFin(${f.id})">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>`;
}
function delFin(id){S.finance=S.finance.filter(f=>f.id!==id);save();render();toast('Transação removida','🗑️')}
function openFin(type,id){
  const f=id?S.finance.find(x=>x.id===id):null;
  const isIn=(f?f.type:type)==='in';
  const opts=isIn?['Renda','Outros']:['Alimentação','Saúde','Transporte','Lazer','Poupança','Outros'];
  modal(`<h3>${f?'Editar':(isIn?'Nova receita':'Novo gasto')}</h3><p class="ms">Registre a movimentação</p>
    <div class="frow"><label class="fl">Descrição</label><input class="input" id="fD" placeholder="${isIn?'Ex: Salário':'Ex: Almoço'}" value="${f?esc(f.desc):''}"></div>
    <div class="fgrid">
      <div class="frow"><label class="fl">Valor (R$)</label><input type="number" step="0.01" class="input" id="fV" placeholder="0,00" value="${f?f.val:''}"></div>
      <div class="frow"><label class="fl">Categoria</label>
        <select class="input" id="fC">${opts.map(c=>`<option ${f&&f.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveFin('${isIn?'in':'out'}',${id||0})">Salvar</button></div>`);
  setTimeout(()=>$('#fD')?.focus(),50);
}
function saveFin(type,id){const desc=$('#fD').value.trim(),val=parseFloat($('#fV').value);
  if(!desc||!val)return;const cat=$('#fC').value;
  if(id){Object.assign(S.finance.find(x=>x.id===id),{desc,val,type,cat});toast('Transação atualizada','✏️')}
  else{S.finance.push({id:uid(),desc,val,type,cat,date:todayISO()});addXp(5);
    toast(type==='in'?'Receita registrada':'Gasto registrado',type==='in'?'💰':'💸')}
  save();closeModal();render()}

function emptyState(msg){
  return `<div class="empty">
    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    <div>${msg}</div></div>`;
}

async function getAbacusKey(){
  let k=localStorage.getItem('vtz_abacus_key');
  if(k)return k;
  if(SYNC.user&&SYNC.db){
    try{const {doc,getDoc}=window.FB;
      const snap=await getDoc(doc(SYNC.db,'users',SYNC.user.uid));
      if(snap.exists()&&snap.data().state?.abacusKey){
        k=snap.data().state.abacusKey;
        localStorage.setItem('vtz_abacus_key',k);return k;
      }
    }catch(e){}
  }
  if(S.abacusKey){localStorage.setItem('vtz_abacus_key',S.abacusKey);return S.abacusKey;}
  return null;
}
async function callAbacus(msgs,maxTok=300,sys=null){
  const key=await getAbacusKey();
  if(!key)throw new Error('Chave Abacus não configurada. Vá em Configurações → Abacus AI Key.');
  const sysMsg=sys||'Responda sempre em português brasileiro. Seja objetivo e direto.';
  const r=await fetch('https://routellm.abacus.ai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'route-llm',messages:[
      {role:'system',content:sysMsg},
      ...msgs],max_tokens:maxTok})
  });
  if(!r.ok)throw new Error('API error: '+r.status);
  const d=await r.json();
  return d.choices?.[0]?.message?.content||'(sem resposta)';
}

function mdToHtml(raw){
  let s=raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // headers ## ou **Título** sozinhos na linha
  s=s.replace(/^#{1,3}\s+(.+)$/gm,'<div class="jh">$1</div>');
  s=s.replace(/^\*\*([^*\n]+)\*\*\s*$/gm,'<div class="jh">$1</div>');
  // bold inline
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  // italic
  s=s.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  // listas (*, -, •)
  s=s.replace(/^[\*\-•]\s+(.+)$/gm,'<div class="jli"><span>•</span><span>$1</span></div>');
  // parágrafos
  s=s.replace(/\n{2,}/g,'</p><p class="jp">');
  s=s.replace(/\n/g,'<br>');
  return '<p class="jp">'+s+'</p>';
}

            stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 90 90)"/>
        </svg>
        <div class="pomo-time" style="margin-top:-170px;position:relative;color:${pomoState.phase==='work'?'var(--accent-2)':'var(--green)'}">${mins}:${sec}</div>

        <div class="pomo-btns">
          <button class="btn ${pomoState.running?'btn-ghost':'btn-primary'}" onclick="${pomoState.running?'pomoPause()':'pomoStart()'}">
            ${pomoState.running?'⏸ Pausar':'▶ Iniciar'}</button>
          <button class="btn btn-ghost" onclick="pomoReset()">↺ Reset</button>
        </div>
      </div>
    </div>
    <div class="grid" style="gap:14px">
      <div class="card">
        <b style="font-family:var(--display);font-size:15px;display:block;margin-bottom:14px">Configurar</b>
        <div class="frow" style="margin-bottom:12px"><label class="fl">Foco (min)</label>
          <input type="number" class="input" id="pomoWork" value="${pomoState.work}" min="1" max="90" onchange="pomoSetWork(+this.value)"></div>
        <div class="frow"><label class="fl">Descanso (min)</label>

        <b style="font-family:var(--display);font-size:15px;display:block;margin-bottom:10px">Estatísticas</b>
        <div style="display:flex;gap:10px">

        </div>
        <p style="font-size:12.5px;color:var(--txt-3);margin-top:12px;line-height:1.5">Alertas de voz ativados. Você vai ouvir avisos ao trocar de fase.</p>
      </div>
      <div class="card">
        <b style="font-family:var(--display);font-size:15px;display:block;margin-bottom:10px">Bloqueio mental</b>
        <p style="font-size:13.5px;color:var(--txt-2);line-height:1.55;margin-bottom:12px">
          "Só 25 minutos. Coloca o telefone longe, fecha as abas desnecessárias e começa."</p>
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="speak('Foco total. Você tem '+pomoState.work+' minutos. Elimine distrações agora. Vamos.')">
          🔊 Motivação por voz</button>
      </div>
    </div>
  </div>`;
}
function pomoStart(){
  if(pomoState.running)return;
  pomoState.running=true;
  speak('Iniciando foco. '+pomoState.work+' minutos. Concentre-se.');
  pomoState.timer=setInterval(()=>{
    pomoState.secs--;
    if(pomoState.secs<=0){
      if(pomoState.phase==='work'){
        pomoState.phase='rest';pomoState.secs=pomoState.rest*60;
        speak('Tempo de foco encerrado. Descanse '+pomoState.rest+' minutos.');
        addXp(20);
      } else {
        pomoState.phase='work';pomoState.round++;pomoState.secs=pomoState.work*60;
        speak('Descanso encerrado. Iniciando rodada '+pomoState.round+'. Foco total.');
      }
    }
    if(currentView==='foco')render();
  },1000);
  render();
}
function pomoPause(){clearInterval(pomoState.timer);pomoState.running=false;render()}
function pomoReset(){clearInterval(pomoState.timer);
  pomoState={...pomoState,running:false,round:1,phase:'work',secs:pomoState.work*60,timer:null};render()}
function pomoSetWork(v){if(!pomoState.running&&v>0){pomoState.work=v;pomoState.secs=v*60;render()}}
function pomoSetRest(v){if(!pomoState.running&&v>0){pomoState.rest=v;render()}}

/* =================================================================
   WEB SPEECH API — voz
   ================================================================= */
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='pt-BR';u.rate=0.92;u.pitch=1.05;u.volume=1;
  const doSpeak=()=>{
    const vs=window.speechSynthesis.getVoices();
    const pt=vs.find(v=>v.lang==='pt-BR'&&v.localService)||
              vs.find(v=>v.lang==='pt-BR')||
              vs.find(v=>v.lang.startsWith('pt'));
    if(pt)u.voice=pt;
    window.speechSynthesis.speak(u);
  };
  const vs=window.speechSynthesis.getVoices();
  if(vs.length)doSpeak();
  else{window.speechSynthesis.onvoiceschanged=()=>{doSpeak();window.speechSynthesis.onvoiceschanged=null;};}
}

async function shapeAnalyze(e){
  const file=e.target.files[0];if(!file)return;
  document.getElementById('shapeLoading').style.display='block';
  const canvas=document.getElementById('shapeCanvas');
  const img=new Image();
  img.onload=async()=>{
    const max=600;const scale=Math.min(max/img.width,max/img.height,1);
    canvas.width=img.width*scale;canvas.height=img.height*scale;
    canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
    const b64=canvas.toDataURL('image/jpeg',.7).split(',')[1];
    try{
      const r=await callAbacus([{role:'user',content:[
        {type:'text',text:'Analise esta foto de corpo/físico. Retorne JSON com: score(0-10), label(ex:"bom progresso"), zones=[{ic,n,v,c}] (3 zonas: ombro/peito, abdome, pernas, usando emojis e cores CSS), advice(string curta de feedback direto). Seja direto e honesto.'},
        {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}}
      ]}],400);
      let parsed;
      try{parsed=JSON.parse(r.match(/\{[\s\S]*\}/)?.[0]||r)}
      catch{parsed={score:5,label:'análise concluída',zones:[{ic:'💪',n:'Superioir',v:'ok',c:'var(--amber)'},{ic:'🔥',n:'Core',v:'em progresso',c:'var(--amber)'},{ic:'🦵',n:'Inferior',v:'ok',c:'var(--green)'}],advice:r.slice(0,200)}}
      parsed.date=new Date().toLocaleDateString('pt-BR');
      localStorage.setItem('vtz_shape_result',JSON.stringify(parsed));
      toast('Shape analisado!','👁️');addXp(15);render();
    }catch(err){toast('Erro: '+err.message,'⚠️');document.getElementById('shapeLoading').style.display='none';}
  };
  img.src=URL.createObjectURL(file);
}

function playerCard(){

function openBook(id){ttsState.bookId=id;ttsState.playing=false;ttsState.pos=0;render()}
function ttsPlay(){
  const b=BOOKS.find(x=>x.id===ttsState.bookId);if(!b)return;
  ttsState.playing=true;render();
  const u=new SpeechSynthesisUtterance(b.content.slice(ttsState.pos));
  u.lang='pt-BR';u.rate=1.0;
  u.onend=()=>{ttsState.playing=false;localStorage.setItem('vtz_book_prog_'+b.id,'100');render();}
  u.onboundary=e=>{ttsState.pos=e.charIndex;
    const pct=Math.round(ttsState.pos/b.content.length*100);
    localStorage.setItem('vtz_book_prog_'+b.id,pct);}
  window.speechSynthesis.speak(u);
}
function ttsPause(){window.speechSynthesis.pause();ttsState.playing=false;render()}
function ttsStop(){window.speechSynthesis.cancel();ttsState.playing=false;ttsState.bookId=null;render()}

/* =================================================================
   PLANEJAMENTO SEMANAL AUTOMÁTICO (Abacus, dom ingo → cache Firestore)
   ================================================================= */
async function getWeeklyPlan(){
  const cacheKey='vtz_weekly_'+getMonday();
  let cached=localStorage.getItem(cacheKey);
  if(cached)return JSON.parse(cached);
  if(SYNC.user&&SYNC.db){
    try{const {doc,getDoc}=window.FB;
      const snap=await getDoc(doc(SYNC.db,'cache','weekly_'+SYNC.user.uid));
      if(snap.exists()&&snap.data().week===getMonday()){
        localStorage.setItem(cacheKey,JSON.stringify(snap.data().plan));
        return snap.data().plan;}
    }catch(e){}
  }
  return null;
}
function getMonday(){
  const d=new Date();const day=d.getDay();
  d.setDate(d.getDate()-(day===0?6:day-1));return d.toISOString().slice(0,10);
}
async function generateWeeklyPlan(){
  toast('Gerando planejamento semanal…','⏳');
  const tasks=S.tasks.slice(-10).map(t=>t.title).join(', ');
  const habits=S.habits.map(h=>h.name).join(', ');
  const xp=S.xp;
  try{
    const r=await callAbacus([{role:'user',content:`Crie um planejamento semanal para Victor (17 anos, musculação, escola).
Tarefas recentes: ${tasks}. Hábitos: ${habits}. XP: ${xp}.
Retorne lista de prioridades por dia (seg-dom), com 3 focos por dia. Seja conciso.`}],600);
    const cacheKey='vtz_weekly_'+getMonday();
    const data={text:r,date:new Date().toLocaleDateString('pt-BR'),week:getMonday()};
    localStorage.setItem(cacheKey,JSON.stringify(data));
    if(SYNC.user&&SYNC.db){
      try{const {doc,setDoc}=window.FB;
        await setDoc(doc(SYNC.db,'cache','weekly_'+SYNC.user.uid),{plan:data,week:getMonday()});
      }catch(e){}
    }
    toast('Planejamento gerado!','📅');addXp(10);
    return data;
  }catch(e){toast('Erro: '+e.message,'⚠️');return null;}
}

/* =================================================================

async function jarvisFinanceAnalysis(){
  const inc=S.finance.filter(f=>f.type==='in').reduce((a,b)=>a+b.val,0);
  const out=S.finance.filter(f=>f.type==='out').reduce((a,b)=>a+b.val,0);
  const byCat={};S.finance.filter(f=>f.type==='out').forEach(f=>byCat[f.cat]=(byCat[f.cat]||0)+f.val);
  const catStr=Object.entries(byCat).map(([c,v])=>`${c}:R$${v.toFixed(0)}`).join(', ');
  toast('Analisando finanças…','🤖');
  try{
    const r=await callAbacus([{role:'user',content:`Analise as finanças: receitas=R$${inc.toFixed(0)}, gastos=R$${out.toFixed(0)}, categorias: ${catStr}.
Dê feedback direto em 3 pontos: o que está bom, o que cortar, e uma ação imediata de economia.`}],200);
    modal(`<h3>🤖 Análise JARVIS — Finanças</h3>
      <p class="ms">Baseado nos seus dados financeiros</p>
      <div style="font-size:13.5px;line-height:1.6;color:var(--txt-2);white-space:pre-wrap">${esc(r)}</div>
      <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Fechar</button></div>`);
  }catch(e){toast('Erro: '+e.message,'⚠️');}
}

/* =================================================================
   PREDIÇÃO DE RESULTADOS
   ================================================================= */
function viewPredição(m){
  const streak=streakCount();
  const habPct=Math.round(S.habits.filter(h=>h.log[todayISO()]).length/Math.max(1,S.habits.length)*100);
  const tasksLast7=()=>{let c=0;for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);c+=S.tasks.filter(t=>t.due===k&&t.done).length;}return c;}
  const weekScore=Math.min(100,Math.round((streak/14*40)+(habPct*.3)+(tasksLast7()/14*30)));
  const predDays=[30,90,180];
  return `
  <div class="section-head"><div><h2>Predição de Resultados</h2><p>Baseado no histórico local</p></div></div>
  <div class="stat-row" style="grid-template-columns:repeat(3,1fr)">
    ${predDays.map(d=>{
      const proj=Math.min(100,Math.round(weekScore*(1+d/300)));
      return statCard(d+' dias','~'+proj+'%','de consistência projetada',proj>70?'var(--green)':'var(--amber)','var(--accent)','rgba(109,94,252,.13)','<path d="M3 12l4-4 4 4 4-8 6 12"/>');
    }).join('')}
  </div>
  <div class="card" style="margin-top:16px">
    <b style="font-family:var(--display);font-size:15px;display:block;margin-bottom:12px">Análise atual</b>
    <p style="color:var(--txt-2);font-size:13.5px;line-height:1.6">
      Streak: <b style="color:var(--accent-2)">${streak} dias</b> ·
      Hábitos hoje: <b style="color:var(--green)">${habPct}%</b> ·
      Score semanal: <b style="color:${weekScore>70?'var(--green)':'var(--amber)'}">${weekScore}/100</b>
    </p>
    <p style="color:var(--txt-3);font-size:13px;margin-top:12px;line-height:1.5">
      ${weekScore>=70?'🔥 Excelente consistência! Mantenha o ritmo por mais 30 dias para hábitos automáticos.':
        weekScore>=40?'📈 Progresso moderado. Foque em 1 hábito crítico por semana para acelerar.':
        '⚡ Comece pequeno: 1 hábito, 1 tarefa por dia. Consistência supera intensidade.'}
    </p>
  </div>`;
}

/* Injeta predição como view */
function viewPredView(m){m.innerHTML=viewPredição();}
